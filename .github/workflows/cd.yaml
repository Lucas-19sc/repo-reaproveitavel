name: Deploy Fake
on:
  workflow_call:
    secrets:
      ambiente:
        required: true
        description: "Ambiente onde vai ser feito o deploy"
jobs:
  deploy-kubernetes:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no ambiente
        run: echo "Executando o deploy no ambiente de ${{ secrets.ambiente }}"

      - name: CURL Deploy no ambiente
        run: curl -X POST https://webhook.site/668a4f94-8937-4880-80ba-95461665630b -d '{"ambiente": "${{ secrets.ambiente }}"}'